name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pygame sounddevice numpy scipy pyinstaller

      - name: Bundle PortAudio DLL + Build EXE
        shell: pwsh
        run: |
          # Find the PortAudio DLL that ships inside the sounddevice package
          $sdDir = python -c "import sounddevice, os; print(os.path.dirname(sounddevice.__file__))"
          $dlls = Get-ChildItem -Path $sdDir -Recurse -Filter "*.dll" | Select-Object -ExpandProperty FullName
          $addBinary = ($dlls | ForEach-Object { "--add-binary `"$_;.`"" }) -join " "

          # Build with explicit DLL inclusion
          $cmd = "pyinstaller --onefile --windowed --name BrutalSequencer " +
                 "--collect-all sounddevice --collect-data sounddevice " +
                 "--collect-all pygame $addBinary brutal_sequencer.py"
          Write-Host "Running: $cmd"
          Invoke-Expression $cmd

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: BrutalSequencer-Windows
          path: dist/BrutalSequencer.exe
          retention-days: 90
