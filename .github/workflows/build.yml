name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pygame numpy scipy pyinstaller

      - name: Build EXE
        run: >
          pyinstaller
          --onefile
          --windowed
          --name BrutalSequencer
          --collect-all pygame
          --collect-binaries pygame
          --hidden-import pygame
          --hidden-import pygame.mixer
          --hidden-import numpy
          --hidden-import scipy
          --hidden-import scipy.signal
          brutal_sequencer.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: BrutalSequencer-Windows
          path: dist/BrutalSequencer.exe
          retention-days: 90
